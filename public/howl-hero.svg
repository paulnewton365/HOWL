<!--
  HOWL hero placeholder — referenced by the intake page until you drop in your
  actual face/flowers photograph from the deck.

  TO USE THE REAL ASSET:
  1. Save your photo (the woman with orange flowers) as howl-hero.jpg in /public/
  2. The app will use it automatically — no code change required.

  This SVG is a fallback so the layout doesn't break before you add the photo.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 600" preserveAspectRatio="xMidYMid slice">
  <!-- Dark base -->
  <rect width="480" height="600" fill="#0A0A0A"/>

  <!-- Subtle texture stripes (evoking the brushed/silver feel of the original) -->
  <g opacity="0.08">
    <rect x="0" y="0" width="480" height="2" fill="#FFF"/>
    <rect x="0" y="40" width="480" height="1" fill="#FFF"/>
    <rect x="0" y="90" width="480" height="2" fill="#FFF"/>
    <rect x="0" y="150" width="480" height="1" fill="#FFF"/>
    <rect x="0" y="220" width="480" height="2" fill="#FFF"/>
    <rect x="0" y="300" width="480" height="1" fill="#FFF"/>
    <rect x="0" y="380" width="480" height="2" fill="#FFF"/>
    <rect x="0" y="470" width="480" height="1" fill="#FFF"/>
    <rect x="0" y="540" width="480" height="2" fill="#FFF"/>
  </g>

  <!-- Orange flower motifs (echoing the deck cover) -->
  <g fill="#F47245">
    <!-- Top-left flower -->
    <g transform="translate(80,80) rotate(15)">
      <ellipse cx="0" cy="-22" rx="14" ry="22"/>
      <ellipse cx="20" cy="-8" rx="14" ry="22" transform="rotate(72 20 -8)"/>
      <ellipse cx="12" cy="18" rx="14" ry="22" transform="rotate(144 12 18)"/>
      <ellipse cx="-12" cy="18" rx="14" ry="22" transform="rotate(216 -12 18)"/>
      <ellipse cx="-20" cy="-8" rx="14" ry="22" transform="rotate(288 -20 -8)"/>
      <circle cx="0" cy="0" r="8" fill="#D85726"/>
    </g>
    <!-- Bottom-right cluster -->
    <g transform="translate(360,490) rotate(-25)" opacity="0.9">
      <ellipse cx="0" cy="-22" rx="14" ry="22"/>
      <ellipse cx="20" cy="-8" rx="14" ry="22" transform="rotate(72 20 -8)"/>
      <ellipse cx="12" cy="18" rx="14" ry="22" transform="rotate(144 12 18)"/>
      <ellipse cx="-12" cy="18" rx="14" ry="22" transform="rotate(216 -12 18)"/>
      <ellipse cx="-20" cy="-8" rx="14" ry="22" transform="rotate(288 -20 -8)"/>
      <circle cx="0" cy="0" r="8" fill="#D85726"/>
    </g>
    <!-- Mid-bottom small flower -->
    <g transform="translate(160,540) rotate(40) scale(0.7)">
      <ellipse cx="0" cy="-22" rx="14" ry="22"/>
      <ellipse cx="20" cy="-8" rx="14" ry="22" transform="rotate(72 20 -8)"/>
      <ellipse cx="12" cy="18" rx="14" ry="22" transform="rotate(144 12 18)"/>
      <ellipse cx="-12" cy="18" rx="14" ry="22" transform="rotate(216 -12 18)"/>
      <ellipse cx="-20" cy="-8" rx="14" ry="22" transform="rotate(288 -20 -8)"/>
      <circle cx="0" cy="0" r="8" fill="#D85726"/>
    </g>
  </g>

  <!-- Placeholder label, removed once the real image is dropped in -->
  <text x="240" y="305" text-anchor="middle"
        font-family="Anton, Inter, sans-serif" font-size="34" fill="#FAF7EF"
        letter-spacing="3" opacity="0.5">PLACEHOLDER</text>
  <text x="240" y="335" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="11" fill="#FAF7EF"
        letter-spacing="2" opacity="0.5">DROP howl-hero.jpg INTO /public</text>
</svg>
