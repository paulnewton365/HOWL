<!--
  HOWL wordmark — SVG approximation of the actual logo (the iris-aperture in the O).
  REPLACE this file with your official logo SVG if you have a vector copy.
  The app references this at /howl-logo.svg.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- One iris wedge: a narrow triangle starting at inner radius -->
    <polygon id="howl-wedge" points="20,-3 80,-12 80,12" fill="#0A0A0A"/>
  </defs>

  <style>
    .howl-letter {
      font-family: 'Anton', 'Inter Black', 'Impact', sans-serif;
      font-weight: 900;
      font-size: 220px;
      fill: #0A0A0A;
      letter-spacing: -10px;
    }
  </style>

  <!-- H -->
  <text x="0" y="180" class="howl-letter">H</text>

  <!-- O — replaced by iris/aperture -->
  <g transform="translate(330, 110)">
    <!-- 18 wedges rotated around the center -->
    <use href="#howl-wedge" transform="rotate(0)"/>
    <use href="#howl-wedge" transform="rotate(20)"/>
    <use href="#howl-wedge" transform="rotate(40)"/>
    <use href="#howl-wedge" transform="rotate(60)"/>
    <use href="#howl-wedge" transform="rotate(80)"/>
    <use href="#howl-wedge" transform="rotate(100)"/>
    <use href="#howl-wedge" transform="rotate(120)"/>
    <use href="#howl-wedge" transform="rotate(140)"/>
    <use href="#howl-wedge" transform="rotate(160)"/>
    <use href="#howl-wedge" transform="rotate(180)"/>
    <use href="#howl-wedge" transform="rotate(200)"/>
    <use href="#howl-wedge" transform="rotate(220)"/>
    <use href="#howl-wedge" transform="rotate(240)"/>
    <use href="#howl-wedge" transform="rotate(260)"/>
    <use href="#howl-wedge" transform="rotate(280)"/>
    <use href="#howl-wedge" transform="rotate(300)"/>
    <use href="#howl-wedge" transform="rotate(320)"/>
    <use href="#howl-wedge" transform="rotate(340)"/>

    <!-- Center hole — matches page cream so it reads as 'open' -->
    <circle cx="0" cy="0" r="18" fill="#F2EFE7"/>
  </g>

  <!-- W -->
  <text x="430" y="180" class="howl-letter">W</text>

  <!-- L -->
  <text x="610" y="180" class="howl-letter">L</text>
</svg>
